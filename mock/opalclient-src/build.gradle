plugins {
    id 'fabric-loom' version '1.2-SNAPSHOT'
    id 'java'
}

repositories {
    mavenCentral()
    maven { url = 'https://maven.fabricmc.net/' }
}

def minecraft_version = '1.19.4'

def yarn_mappings = '23.3.29'

def loader_version = '0.14.23'

def fabric_api_version = '0.89.0+1.19.4'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(17)
    }
}

dependencies {
    minecraft "com.mojang:minecraft:${minecraft_version}"
    mappings "net.fabricmc:yarn:${yarn_mappings}:v2"

    modImplementation "net.fabricmc:fabric-loader:${loader_version}"
    modImplementation "net.fabricmc.fabric-api:fabric-api:${fabric_api_version}"
    implementation 'com.google.code.gson:gson:2.10.1'
}

processResources {
    from(sourceSets.main.resources.srcDirs) {
        expand(minecraft_version: minecraft_version)
    }
}

jar {
    manifest {
        attributes 'Implementation-Title': 'Opal Client Mock',
                   'Implementation-Version': project.version
    }
}
